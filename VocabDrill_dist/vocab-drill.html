<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabDrill</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e14; }
  button { cursor: pointer; }
  input:focus { border-color: #6f8fff !important; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── キー ───────────────────────────────────────────────────────────────────
const KEY_DATA    = "vocabdrill-v3-data";
const KEY_GAS_URL = "vocabdrill-v3-gasurl";

// ── ユーティリティ ─────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);
const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const reinsert = (queue, word) => {
  const len = queue.length;
  if (len === 0) return [word];
  const min = Math.min(2, len);
  const pos = min + Math.floor(Math.random() * (len - min + 1));
  const next = [...queue];
  next.splice(pos, 0, { ...word, _retry: true });
  return next;
};

const DEFAULT_DATA = {
  folders: [
    {
      id: "demo1", name: "単語 1〜100",
      words: [
        { id: "w1", word: "ephemeral",  meaning: "短命な、はかない",        example: "The ephemeral beauty of cherry blossoms." },
        { id: "w2", word: "eloquent",   meaning: "雄弁な、説得力のある",    example: "She gave an eloquent speech." },
        { id: "w3", word: "resilient",  meaning: "回復力のある、しなやかな", example: "Children are remarkably resilient." },
      ],
    },
    {
      id: "demo2", name: "単語 101〜200",
      words: [
        { id: "w4", word: "ambiguous", meaning: "曖昧な、多義的な",   example: "The contract was full of ambiguous language." },
        { id: "w5", word: "tenacious", meaning: "粘り強い、しつこい", example: "She was tenacious in her pursuit of justice." },
      ],
    },
  ],
};

// ── localStorage helpers ───────────────────────────────────────────────────
function localGet(key) { try { return localStorage.getItem(key); } catch { return null; } }
function localSet(key, val) { try { localStorage.setItem(key, val); } catch {} }

// ── GAS API ────────────────────────────────────────────────────────────────
async function gasGet(url) {
  const res = await fetch(url, { redirect: "follow" });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error);
  return json.data;
}
async function gasPost(url, data) {
  const res = await fetch(url, { method: "POST", body: JSON.stringify({ data }), redirect: "follow" });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error);
}

// ══════════════════════════════════════════════════════════════════════════
//  App
// ══════════════════════════════════════════════════════════════════════════
function App() {
  const [data,           setData]           = useState(null);
  const [gasUrl,         setGasUrl]         = useState("");
  const [screen,         setScreen]         = useState("home");
  const [activeFolderId, setActiveFolderId] = useState(null);
  const [quizState,      setQuizState]      = useState(null);
  const [syncStatus,     setSyncStatus]     = useState("idle");
  const [syncMsg,        setSyncMsg]        = useState("");

  // 初回ロード
  useEffect(() => {
    (async () => {
      const savedUrl  = localGet(KEY_GAS_URL) ?? "";
      const savedData = localGet(KEY_DATA);
      setGasUrl(savedUrl);

      if (savedUrl) {
        setSyncStatus("loading");
        try {
          const remote = await gasGet(savedUrl);
          setData(remote);
          localSet(KEY_DATA, JSON.stringify(remote));
          setSyncStatus("ok"); setSyncMsg("同期完了");
          setTimeout(() => { setSyncStatus("idle"); setSyncMsg(""); }, 2000);
        } catch {
          setData(savedData ? JSON.parse(savedData) : DEFAULT_DATA);
          setSyncStatus("error"); setSyncMsg("オフライン — ローカルデータを使用中");
        }
      } else {
        setData(savedData ? JSON.parse(savedData) : DEFAULT_DATA);
      }
    })();
  }, []);

  const persist = useCallback(async (newData) => {
    setData(newData);
    localSet(KEY_DATA, JSON.stringify(newData));
    if (gasUrl) {
      setSyncStatus("saving"); setSyncMsg("同期中…");
      try {
        await gasPost(gasUrl, newData);
        setSyncStatus("ok"); setSyncMsg("同期完了");
        setTimeout(() => { setSyncStatus("idle"); setSyncMsg(""); }, 2000);
      } catch {
        setSyncStatus("error"); setSyncMsg("同期失敗（ローカルには保存済み）");
        setTimeout(() => { setSyncStatus("idle"); setSyncMsg(""); }, 3000);
      }
    } else {
      setSyncStatus("ok"); setSyncMsg("保存済");
      setTimeout(() => { setSyncStatus("idle"); setSyncMsg(""); }, 1500);
    }
  }, [gasUrl]);

  const saveGasUrl = useCallback(async (url) => {
    const trimmed = url.trim();
    setGasUrl(trimmed);
    localSet(KEY_GAS_URL, trimmed);
    if (trimmed) {
      setSyncStatus("loading"); setSyncMsg("接続中…");
      try {
        const remote = await gasGet(trimmed);
        setData(remote);
        localSet(KEY_DATA, JSON.stringify(remote));
        setSyncStatus("ok"); setSyncMsg("接続・同期完了！");
        setTimeout(() => { setSyncStatus("idle"); setSyncMsg(""); }, 2000);
      } catch (e) {
        setSyncStatus("error"); setSyncMsg("接続失敗: " + e.message);
        setTimeout(() => { setSyncStatus("idle"); setSyncMsg(""); }, 4000);
      }
    }
  }, []);

  if (!data) return <Loader />;

  const activeFolder = data.folders.find((f) => f.id === activeFolderId);

  const launchQuiz = (words, folderName, direction) => {
    const queue = shuffle(words);
    setQuizState({ current: queue[0], rest: queue.slice(1), folderName, direction,
      revealed: false, totalOriginal: words.length, correctIds: new Set(), wrongCount: 0, correctCount: 0 });
    setScreen("quiz");
  };

  if (screen === "quiz" && quizState)
    return <QuizScreen state={quizState} setState={setQuizState}
      onDone={() => setScreen(activeFolderId ? "folder" : "home")}
      onBack={() => setScreen(activeFolderId ? "folder" : "home")}
      launchQuiz={launchQuiz} />;

  if (screen === "edit" && activeFolder)
    return <EditScreen folder={activeFolder} saveMsg={syncMsg} onBack={() => setScreen("folder")}
      onChange={(upd) => persist({ ...data, folders: data.folders.map((f) => f.id === upd.id ? upd : f) })} />;

  if (screen === "settings")
    return <SettingsScreen gasUrl={gasUrl} onSave={saveGasUrl} onBack={() => setScreen("home")}
      syncStatus={syncStatus} syncMsg={syncMsg} />;

  if (screen === "folder" && activeFolder)
    return <FolderScreen folder={activeFolder}
      onBack={() => { setActiveFolderId(null); setScreen("home"); }}
      onEdit={() => setScreen("edit")}
      onQuiz={(dir) => launchQuiz(activeFolder.words, activeFolder.name, dir)}
      onRename={(name) => persist({ ...data, folders: data.folders.map((f) => f.id === activeFolder.id ? { ...f, name } : f) })} />;

  return <HomeScreen data={data} gasUrl={gasUrl} syncStatus={syncStatus} syncMsg={syncMsg}
    onOpen={(id) => { setActiveFolderId(id); setScreen("folder"); }}
    onAdd={(name) => persist({ ...data, folders: [...data.folders, { id: uid(), name, words: [] }] })}
    onDelete={(id) => persist({ ...data, folders: data.folders.filter((f) => f.id !== id) })}
    onSettings={() => setScreen("settings")}
    onQuizAll={(dir) => {
      const all = data.folders.flatMap((f) => f.words);
      if (!all.length) return;
      setActiveFolderId(null);
      launchQuiz(all, "全フォルダ", dir);
    }} />;
}

// ══════════════════════════════════════════════════════════════════════════
//  SettingsScreen
// ══════════════════════════════════════════════════════════════════════════
function SettingsScreen({ gasUrl, onSave, onBack, syncStatus, syncMsg }) {
  const [url, setUrl] = useState(gasUrl);
  return (
    <div style={S.root}>
      <div style={S.screenHead}>
        <button style={S.backBtn} onClick={onBack}>← ホーム</button>
        <span style={S.screenTitle}>同期設定</span>
      </div>
      <div style={S.settingsBox}>
        <div style={S.stepBlock}>
          <div style={S.stepTitle}>📋 セットアップ手順</div>
          {[
            "Google スプレッドシートを新規作成",
            "メニュー「拡張機能」→「Apps Script」を開く",
            "配布された VocabDrill.gs のコードを貼り付けて保存",
            "「デプロイ」→「新しいデプロイ」→ 種類「ウェブアプリ」を選択",
            "「アクセスできるユーザー」を「全員」に設定してデプロイ",
            "発行されたウェブアプリ URL をコピーして下に貼り付け",
          ].map((s, i) => (
            <div key={i} style={S.stepRow}>
              <span style={S.stepNum}>{i + 1}</span>
              <span style={S.stepText}>{s}</span>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <label style={S.label}>ウェブアプリ URL</label>
          <input style={S.input} placeholder="https://script.google.com/macros/s/..."
            value={url} onChange={(e) => setUrl(e.target.value)} />
          <button style={url.trim() ? S.btnPrimary : S.btnDis} onClick={() => onSave(url)}>接続・同期する</button>
          {url && <button style={S.btnGhost} onClick={() => { setUrl(""); onSave(""); }}>URLをクリア（ローカルのみに戻す）</button>}
        </div>
        {syncMsg && (
          <div style={{ ...S.syncBadge, ...(syncStatus === "error" ? S.syncError : syncStatus === "ok" ? S.syncOk : S.syncLoading) }}>
            {syncStatus === "loading" || syncStatus === "saving" ? "⟳ " : syncStatus === "ok" ? "✓ " : "✕ "}{syncMsg}
          </div>
        )}
        <div style={S.settingsNote}>URLを設定しない場合は、このデバイス内にのみデータが保存されます。</div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  HomeScreen
// ══════════════════════════════════════════════════════════════════════════
function HomeScreen({ data, gasUrl, syncStatus, syncMsg, onOpen, onAdd, onDelete, onSettings, onQuizAll }) {
  const [newName, setNewName] = useState("");
  const [adding, setAdding] = useState(false);
  const [delConfirm, setDelConfirm] = useState(null);
  const total = data.folders.reduce((s, f) => s + f.words.length, 0);
  const submit = () => { if (!newName.trim()) return; onAdd(newName.trim()); setNewName(""); setAdding(false); };

  return (
    <div style={S.root}>
      <div style={S.homeHead}>
        <div>
          <div style={S.logo}>VOCAB<span style={S.logoAcc}>DRILL</span></div>
          <div style={S.logoSub}>{data.folders.length}フォルダ &nbsp;·&nbsp; {total}語</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
          <button style={S.settingsBtn} onClick={onSettings}>
            <span style={{ color: syncStatus === "error" ? C.red : syncStatus === "ok" ? C.green : syncStatus === "loading" || syncStatus === "saving" ? C.accent : C.textMuted }}>
              {gasUrl ? (syncStatus === "loading" || syncStatus === "saving" ? "⟳" : syncStatus === "ok" ? "✓" : syncStatus === "error" ? "✕" : "☁") : "☁"} 同期
            </span>
          </button>
          {total > 0 && (
            <div style={{ textAlign: "right" }}>
              <div style={S.allLabel}>全単語クイズ</div>
              <div style={{ display: "flex", gap: 6 }}>
                <button style={S.chipBtn} onClick={() => onQuizAll("word2meaning")}>英→日</button>
                <button style={S.chipBtn} onClick={() => onQuizAll("meaning2word")}>日→英</button>
              </div>
            </div>
          )}
        </div>
      </div>
      {syncMsg && syncStatus === "error" && (
        <div style={{ ...S.syncBadge, ...S.syncError, margin: "8px 20px 0" }}>{syncMsg}</div>
      )}
      <div style={S.folderList}>
        {data.folders.map((f, i) => (
          <div key={f.id} style={S.folderCard} onClick={() => onOpen(f.id)}>
            <div style={{ ...S.folderTab, background: COLORS[i % COLORS.length] }} />
            <div style={S.folderBody}>
              <span style={S.folderIcon}>📁</span>
              <div style={S.folderInfo}>
                <div style={S.folderName}>{f.name}</div>
                <div style={S.folderSub}>{f.words.length}語</div>
              </div>
              <button style={S.delBtn} onClick={(e) => { e.stopPropagation(); setDelConfirm(f.id); }}>✕</button>
            </div>
          </div>
        ))}
        {adding ? (
          <div style={S.addForm}>
            <input autoFocus style={S.input} placeholder="フォルダ名（例：単語 1〜100）"
              value={newName} onChange={(e) => setNewName(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && submit()} />
            <div style={{ display: "flex", gap: 8 }}>
              <button style={S.btnPrimary} onClick={submit}>作成</button>
              <button style={S.btnGhost} onClick={() => { setAdding(false); setNewName(""); }}>キャンセル</button>
            </div>
          </div>
        ) : (
          <button style={S.addBtn} onClick={() => setAdding(true)}>
            <span style={{ fontSize: 18, marginRight: 6 }}>＋</span>新しいフォルダ
          </button>
        )}
      </div>
      {delConfirm && (
        <Modal msg={`「${data.folders.find(f => f.id === delConfirm)?.name}」を削除しますか？\n中の単語もすべて消えます。`}
          okLabel="削除" danger
          onOk={() => { onDelete(delConfirm); setDelConfirm(null); }}
          onCancel={() => setDelConfirm(null)} />
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  FolderScreen
// ══════════════════════════════════════════════════════════════════════════
function FolderScreen({ folder, onBack, onEdit, onQuiz, onRename }) {
  const [editing, setEditing] = useState(false);
  const [nameVal, setNameVal] = useState(folder.name);
  const [filter, setFilter] = useState("");
  const filtered = folder.words.filter(
    (w) => w.word.toLowerCase().includes(filter.toLowerCase()) || w.meaning.includes(filter)
  );
  const commit = () => { onRename(nameVal.trim() || folder.name); setEditing(false); };
  return (
    <div style={S.root}>
      <div style={S.screenHead}>
        <button style={S.backBtn} onClick={onBack}>← ホーム</button>
        {editing
          ? <input autoFocus style={{ ...S.input, flex: 1, margin: "0 8px" }} value={nameVal}
              onChange={(e) => setNameVal(e.target.value)} onBlur={commit}
              onKeyDown={(e) => e.key === "Enter" && commit()} />
          : <div style={{ ...S.screenTitle, cursor: "pointer" }} onClick={() => setEditing(true)}>
              {folder.name} <span style={{ fontSize: 11, color: C.textMuted }}>✏️</span>
            </div>}
        <button style={S.editBtn} onClick={onEdit}>単語を編集</button>
      </div>
      <div style={S.quizPanel}>
        <div style={S.qpLabel}>{folder.words.length}語 — クイズ開始</div>
        <div style={{ display: "flex", gap: 10 }}>
          <button style={folder.words.length ? S.qbig : S.qbigDis} onClick={() => folder.words.length && onQuiz("word2meaning")}>🇬🇧&nbsp; 英 → 日</button>
          <button style={folder.words.length ? S.qbig : S.qbigDis} onClick={() => folder.words.length && onQuiz("meaning2word")}>🇯🇵&nbsp; 日 → 英</button>
        </div>
        {!folder.words.length && <div style={S.emptyNote}>単語を追加してから始めてください</div>}
      </div>
      {folder.words.length > 0 && (
        <div style={S.section}>
          <input style={{ ...S.input, marginBottom: 10, fontSize: 13 }} placeholder="🔍  検索..."
            value={filter} onChange={(e) => setFilter(e.target.value)} />
          {filtered.map((w) => (
            <div key={w.id} style={S.wordView}>
              <span style={S.wWord}>{w.word}</span>
              <span style={S.wMeaning}>{w.meaning}</span>
              {w.example && <span style={S.wEx}>{w.example}</span>}
            </div>
          ))}
          {!filtered.length && <div style={S.emptyNote}>該当なし</div>}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  EditScreen
// ══════════════════════════════════════════════════════════════════════════
function EditScreen({ folder, saveMsg, onBack, onChange }) {
  const [form, setForm] = useState({ word: "", meaning: "", example: "" });
  const [editId, setEditId] = useState(null);
  const [filter, setFilter] = useState("");
  const wordRef = useRef(null);
  const submit = () => {
    if (!form.word.trim() || !form.meaning.trim()) return;
    if (editId) onChange({ ...folder, words: folder.words.map((w) => w.id === editId ? { ...form, id: editId } : w) });
    else onChange({ ...folder, words: [...folder.words, { ...form, id: uid() }] });
    setForm({ word: "", meaning: "", example: "" }); setEditId(null); wordRef.current?.focus();
  };
  const startEdit = (w) => { setForm({ word: w.word, meaning: w.meaning, example: w.example || "" }); setEditId(w.id); wordRef.current?.focus(); };
  const del = (id) => { onChange({ ...folder, words: folder.words.filter((w) => w.id !== id) }); if (editId === id) { setForm({ word: "", meaning: "", example: "" }); setEditId(null); } };
  const filtered = folder.words.filter((w) => w.word.toLowerCase().includes(filter.toLowerCase()) || w.meaning.includes(filter));
  return (
    <div style={S.root}>
      <div style={S.screenHead}>
        <button style={S.backBtn} onClick={onBack}>← {folder.name}</button>
        <span style={S.screenTitle}>単語を編集</span>
        {saveMsg && <span style={{ fontSize: 11, color: saveMsg.includes("失敗") ? C.red : saveMsg.includes("中") ? C.accent : C.green, fontFamily: "sans-serif" }}>{saveMsg}</span>}
      </div>
      <div style={S.formBox}>
        {[
          { key: "word",    label: "英単語 *",    ph: "例: ephemeral",            ref: wordRef },
          { key: "meaning", label: "意味 *",       ph: "例: 短命な、はかない" },
          { key: "example", label: "例文（任意）", ph: "例: The ephemeral beauty..." },
        ].map(({ key, label, ph, ref }) => (
          <div key={key} style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <label style={S.label}>{label}</label>
            <input ref={ref || null} style={S.input} placeholder={ph} value={form[key]}
              onChange={(e) => setForm(f => ({ ...f, [key]: e.target.value }))}
              onKeyDown={key === "example" ? (e) => e.key === "Enter" && submit() : undefined} />
          </div>
        ))}
        <div style={{ display: "flex", gap: 8 }}>
          <button style={form.word && form.meaning ? S.btnPrimary : S.btnDis} onClick={submit}>{editId ? "✏️ 更新" : "＋ 追加"}</button>
          {editId && <button style={S.btnGhost} onClick={() => { setForm({ word: "", meaning: "", example: "" }); setEditId(null); }}>キャンセル</button>}
        </div>
      </div>
      <div style={S.section}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 12, color: C.textSub, fontFamily: "sans-serif" }}>{folder.words.length}語</span>
          <input style={{ ...S.input, width: 140, fontSize: 13 }} placeholder="検索..." value={filter} onChange={(e) => setFilter(e.target.value)} />
        </div>
        {!filtered.length && <div style={S.emptyNote}>単語がまだありません</div>}
        {filtered.map((w) => (
          <div key={w.id} style={{ ...S.wordView, ...(editId === w.id ? { border: `1px solid ${C.accent}`, background: C.accentGlow } : {}) }}>
            <div style={{ flex: 1 }}>
              <span style={S.wWord}>{w.word}</span>
              <span style={S.wMeaning}>{w.meaning}</span>
              {w.example && <span style={S.wEx}>{w.example}</span>}
            </div>
            <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
              <button style={S.iconBtn} onClick={() => startEdit(w)}>✏️</button>
              <button style={S.iconBtn} onClick={() => del(w.id)}>🗑️</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  QuizScreen
// ══════════════════════════════════════════════════════════════════════════
function QuizScreen({ state, setState, onDone, onBack, launchQuiz }) {
  const { current, rest, folderName, direction, revealed, totalOriginal, correctIds, wrongCount, correctCount } = state;
  const done = !current;

  const reveal  = () => setState(s => ({ ...s, revealed: true }));
  const markOk  = () => {
    const newIds = new Set(correctIds); newIds.add(current.id);
    if (!rest.length) setState(s => ({ ...s, current: null, rest: [], correctIds: newIds, correctCount: correctCount + 1 }));
    else setState(s => ({ ...s, current: rest[0], rest: rest.slice(1), revealed: false, correctIds: newIds, correctCount: correctCount + 1 }));
  };
  const markNg  = () => {
    const newRest = reinsert(rest, current);
    setState(s => ({ ...s, current: newRest[0], rest: newRest.slice(1), revealed: false, wrongCount: wrongCount + 1 }));
  };

  if (done) {
    const acc = correctIds.size > 0 ? Math.round((correctIds.size / (correctIds.size + wrongCount)) * 100) : 0;
    return (
      <div style={S.root}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", gap: 12, padding: "0 24px" }}>
          <div style={{ fontSize: 52 }}>{acc >= 80 ? "🎉" : acc >= 50 ? "💪" : "📚"}</div>
          <div style={{ fontSize: 34, fontWeight: 700, letterSpacing: 2 }}>完了！</div>
          <div style={{ fontSize: 14, color: C.textSub, fontFamily: "sans-serif" }}>{folderName}</div>
          <div style={S.statsGrid}>
            <div style={S.statCell}><div style={{ ...S.statNum, color: C.green }}>{correctIds.size}</div><div style={S.statLabel}>正解</div></div>
            <div style={S.statDivider} />
            <div style={S.statCell}><div style={{ ...S.statNum, color: C.red }}>{wrongCount}</div><div style={S.statLabel}>不正解</div></div>
            <div style={S.statDivider} />
            <div style={S.statCell}><div style={{ ...S.statNum, color: C.accent }}>{acc}%</div><div style={S.statLabel}>正答率</div></div>
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
            <button style={S.btnPrimary} onClick={onDone}>戻る</button>
          </div>
        </div>
      </div>
    );
  }

  const q = direction === "word2meaning" ? current.word    : current.meaning;
  const a = direction === "word2meaning" ? current.meaning : current.word;
  const prog = Math.round((correctIds.size / totalOriginal) * 100);

  return (
    <div style={S.root}>
      <div style={S.screenHead}>
        <button style={S.backBtn} onClick={onBack}>← 戻る</button>
        <div style={{ flex: 1, textAlign: "center" }}>
          <span style={{ fontFamily: "sans-serif", fontSize: 13, fontWeight: 600 }}>{correctIds.size} / {totalOriginal}</span>
          {current._retry && <span style={{ marginLeft: 6, fontSize: 10, color: C.red, fontFamily: "sans-serif", background: "rgba(248,113,113,0.12)", padding: "1px 7px", borderRadius: 99 }}>再出題</span>}
        </div>
        <span style={S.dirChip}>{direction === "word2meaning" ? "英→日" : "日→英"}</span>
      </div>
      <div style={S.bar}><div style={{ ...S.barFill, width: `${prog}%` }} /></div>
      <div style={{ padding: "8px 20px 0", fontSize: 11, color: C.textMuted, fontFamily: "sans-serif" }}>
        📁 {folderName}
        {rest.length > 0 && <span style={{ marginLeft: 8 }}>残り {rest.length + 1}枚（再出題含む）</span>}
      </div>
      <div style={S.quizCard}>
        <div style={{ fontSize: 10, color: C.textMuted, fontFamily: "sans-serif", letterSpacing: 2, textTransform: "uppercase" }}>
          {direction === "word2meaning" ? "この英単語の意味は？" : "この意味の英単語は？"}
        </div>
        <div style={{ fontSize: 30, fontWeight: 700, lineHeight: 1.3 }}>{q}</div>
        {!revealed && direction === "word2meaning" && current.example && (
          <div style={S.hint}>💡 {current.example.replace(new RegExp(`\\b${current.word}\\b`, "gi"), "▢▢▢")}</div>
        )}
        {revealed && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <div style={{ height: 1, background: C.border }} />
            <div style={{ fontSize: 10, color: C.accent, fontFamily: "sans-serif", letterSpacing: 2, textTransform: "uppercase" }}>答え</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: C.green }}>{a}</div>
            {current.example && <div style={{ fontSize: 12, color: C.textSub, fontFamily: "sans-serif", lineHeight: 1.65 }}>📝 {current.example}</div>}
          </div>
        )}
      </div>
      <div style={{ padding: "14px 20px 0" }}>
        {!revealed
          ? <button style={S.revealBtn} onClick={reveal}>答えを見る</button>
          : <div style={S.judgeRow}>
              <button style={S.wrongBtn} onClick={markNg}><span style={S.judgeIcon}>✗</span><span>不正解</span><span style={S.judgeNote}>再出題される</span></button>
              <button style={S.correctBtn} onClick={markOk}><span style={S.judgeIcon}>✓</span><span>正解</span><span style={S.judgeNote}>次へ進む</span></button>
            </div>
        }
      </div>
    </div>
  );
}

// ── Modal / Loader ────────────────────────────────────────────────────────────
function Modal({ msg, okLabel, danger, onOk, onCancel }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24 }}>
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 16, padding: 24, maxWidth: 320, width: "100%" }}>
        <div style={{ fontSize: 15, lineHeight: 1.7, marginBottom: 20, whiteSpace: "pre-line", fontFamily: "sans-serif", color: C.text }}>{msg}</div>
        <div style={{ display: "flex", gap: 10 }}>
          <button style={danger ? { ...S.btnPrimary, background: C.red } : S.btnPrimary} onClick={onOk}>{okLabel}</button>
          <button style={S.btnGhost} onClick={onCancel}>キャンセル</button>
        </div>
      </div>
    </div>
  );
}
function Loader() {
  return <div style={{ background: C.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#6f8fff", fontSize: 28 }}>●</div>;
}
